services:
  ob:
    build: .
    volumes:
      - ./ob-vault:/vault
      - ob-config:/config
    user: "2500:2500"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    stdin_open: true
    tty: true

  sync:
    build: .
    volumes:
      - ./ob-vault:/vault
      - ob-config:/config
    user: "2500:2500"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    command: sync --continuous
    restart: unless-stopped

volumes:
  ob-config:
